<!-- TABIATO: 出身/居住の県グリッド（B）の選択色を state.theme.* に連動 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" sizes="180x180" href="/TABIATO/apple-touch-icon.png">
<title>TABIATO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','YuGothic',sans-serif;background:#f5f5f0;display:flex;flex-direction:column;height:100dvh}

.header{background:#f5f5f0;padding:14px 18px 8px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.counter-group{display:flex;align-items:baseline;gap:5px}
.counter-num{font-size:30px;font-weight:800;color:#1a1a1a;letter-spacing:-1.5px;line-height:1}
.counter-denom{font-size:14px;font-weight:500;color:#bbb}
.gear-btn{width:38px;height:38px;border-radius:50%;background:#eaeae5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:background .15s;flex-shrink:background .15s;transition:background .15s;flex-shrink:0}
.gear-btn:active{background:#d8d8d2}

.progress-wrap{padding:0 18px 10px;flex-shrink:0}
.progress-track{height:3px;background:#e4e4dc;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#2d7a4f;border-radius:2px;transition:width .4s ease}

.map-wrap{flex:1;overflow:hidden;position:relative;touch-action:none}
#mapSvg{width:100%;height:100%;display:none;transform-origin:0 0}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#bbb;letter-spacing:.3px}

.legend-row{
  padding-top:10px;
  padding-right:14px;
  padding-left:28px;
  padding-bottom:calc(22px + env(safe-area-inset-bottom));

  display:flex;
  flex-wrap:wrap;
  gap:10px 14px;
  align-items:flex-start;
  justify-content:flex-start;
  background:#f5f5f0;
}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:#aaa;letter-spacing:.2px;white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.overlay.hidden{display:none}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:0 0 max(28px,env(safe-area-inset-bottom));animation:slideUp .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#e5e5e5;border-radius:2px;margin:12px auto 18px}
.sheet-inner{padding:0 20px}

.pref-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.pref-name{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-.5px}
.pref-region{font-size:12px;color:#ccc;margin-top:3px;letter-spacing:.3px}
.status-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;flex-shrink:0;margin-top:4px}
.pill-visited{background:#e8f5ee;color:#2d7a4f}
.pill-hometown{background:#e8f0fb;color:#2255b0}
.pill-residence{background:#eef3fc;color:#5580cc}
.pill-none{background:#f0f0ec;color:#bbb}

.form-section{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 13px;border-radius:13px;border:1.5px solid #eeeee9;background:#f8f8f5;font-size:16px;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s,background .15s}
.form-input:focus{border-color:#2d7a4f;background:#fff}
.date-range-wrap{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.date-sep{font-size:13px;color:#ccc;text-align:center;flex-shrink:0}

.city-chips-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:#e8f5ee;color:#2d7a4f;font-size:12px;font-weight:600;cursor:pointer;border:none;-webkit-appearance:none}
.chip .chip-x{font-size:14px;color:#2d7a4f;line-height:1;margin-left:1px}
.chip-add-btn{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;background:none;border:1.5px dashed #ccc;color:#aaa;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:all .15s}
.chip-add-btn:active{background:#f5f5f5}
.city-input-wrap{position:relative;margin-top:8px}
.suggest-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #eeeee9;border-radius:13px;max-height:160px;overflow-y:auto;z-index:10;-webkit-overflow-scrolling:touch;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.suggest-item{padding:11px 14px;font-size:14px;color:#1a1a1a;cursor:pointer;border-bottom:1px solid #f4f4f0}
.suggest-item:last-child{border-bottom:none}
.suggest-item:active{background:#f8f8f5}
.suggest-empty{padding:11px 14px;font-size:13px;color:#bbb}

.visit-detail{background:#f8f8f5;border-radius:14px;padding:14px;margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0}
.detail-row+.detail-row{border-top:1px solid #eeeee9}
.detail-key{font-size:12px;color:#bbb;flex-shrink:0;padding-right:12px}
.detail-val{font-size:14px;color:#1a1a1a;font-weight:500;text-align:right;word-break:break-all}

.btn-group{display:flex;gap:9px}
.btn{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:800;font-family:inherit;border:none;cursor:pointer;-webkit-appearance:none;transition:opacity .12s}
.btn:active{opacity:.7}
.btn-ghost{background:#f0f0ec;color:#555}
.btn-green{background:#2d7a4f;color:#fff}
.btn-blue{background:#2255b0;color:#fff}
.del-link{background:none;border:none;font-size:13px;color:#e05252;cursor:pointer;padding:11px 0 0;display:block;text-align:center;-webkit-appearance:none}

.color-palette{display:flex;flex-wrap:wrap;gap:10px}
.color-swatch{
  width:44px;height:38px;border-radius:14px;
  cursor:pointer;border:0;outline:none;
  transition:transform .12s;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  position:relative;-webkit-appearance:none;background:#ccc;
}
.color-swatch:active{transform:scale(.98)}
.check{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  color:#fff;font-weight:900;font-size:22px;line-height:1;
  opacity:0;transition:opacity .12s,transform .12s;
}
.color-swatch.selected .check{opacity:1;transform:translate(-50%,-50%) scale(1.02)}

.settings-tabs{display:flex;gap:0;margin-bottom:18px;background:#f0f0ec;border-radius:12px;padding:3px}
.stab{flex:1;padding:8px;border-radius:10px;text-align:center;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border:none;background:none;-webkit-appearance:none;transition:all .15s}
.stab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.settings-title{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-.5px;margin-bottom:4px}
.settings-sub{font-size:13px;color:#bbb;margin-bottom:16px;line-height:1.5}

.pref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;max-height:200px;overflow-y:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pref-opt{
  padding:9px 4px;border-radius:10px;
  border:1.5px solid #eeeee9;background:#f8f8f5;
  font-size:11px;text-align:center;cursor:pointer;color:#555;font-weight:600;
  transition:all .12s;-webkit-appearance:none;
}
.pref-opt:active{opacity:.7}
.pref-opt.disabled-ht{background:#f0f0ec;color:#ccc;border-color:#eee;cursor:not-allowed;opacity:.6}

.visited-color-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.visited-row{display:flex;align-items:center;gap:12px;width:100%}
.visited-row-swatch{
  width:44px;height:38px;border-radius:14px;flex-shrink:0;background:#ccc;position:relative;display:flex;align-items:center;justify-content:center;
}
.visited-row-swatch .check{opacity:0;transform:translate(-50%,-50%)}
.visited-row.selected .visited-row-swatch .check{opacity:0;transform:translate(-50%,-50%) scale(1.02)}
.visited-row-main{flex:1;min-width:0}
.visited-row-main input.form-input{width:100%;min-height:44px}
.visited-toggle{
  width:130px;flex-shrink:0;
  padding:10px 10px;border-radius:12px;border:1.5px solid #eeeee9;
  background:#f8f8f5;font-size:14px;font-weight:800;color:#555;
  cursor:pointer;-webkit-appearance:none;display:block;
}
.visited-toggle:active{opacity:.7}
.visited-toggle.on{background:#fff;border-color:#2d7a4f;color:#2d7a4f}
</style>
</head>

};

const PREFS_LIST=Object.entries(PREF_MAP).map(([id,name])=>({id,name}));
const UNVISITED_COLOR='#d0d0c8';

const PALETTE_BASE_INPUT=[
  '#30cb88','#958078','#f35f8c','#fa7f78','#fdc02c','#b38bdd','#46b2f7','#3dc1c9'
];

function hexToRgb(hex){
  const h=String(hex||'').replace('#','').trim();
  if(h.length!==6) return null;
  const n=parseInt(h,16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function rgbToHsv(r,g,b){
  const rn=r/255, gn=g/255, bn=b/255;
  const max=Math.max(rn,gn,bn);
  const min=Math.min(rn,gn,bn);
  const d=max-min;
  let h=0;
  if(d===0) h=0;
  else if(max===rn) h=((gn-bn)/d)%6;
  else if(max===gn) h=((bn-rn)/d)+2;
  else h=((rn-gn)/d)+4;
  h*=60;
  if(h<0) h+=360;
  const s=max===0?0:d/max;
  const v=max;
  return {h,s,v};
}
function buildRainbowPalette(){
  const items=PALETTE_BASE_INPUT.map(hex=>{
    const rgb=hexToRgb(hex);
    const hsv=rgbToHsv(rgb.r,rgb.g,rgb.b);
    return {hex,hsv};
  }).sort((a,b)=>a.hsv.h-b.hsv.h);

  const redTarget=0;
  let bestIdx=0;
  let bestDist=Infinity;
  for(let i=0;i<items.length;i++){
    const dist=Math.min(Math.abs(items[i].hsv.h-redTarget), 360-Math.abs(items[i].hsv.h-redTarget));
    if(dist<bestDist){bestDist=dist;bestIdx=i;}
  }
  const rotated=[...items.slice(bestIdx),...items.slice(0,bestIdx)];
  return rotated.map(x=>x.hex.toLowerCase());
}
const RAINBOW_PALETTE_HEX=buildRainbowPalette();
const PALETTE_SET=new Set(RAINBOW_PALETTE_HEX.map(x=>x.toLowerCase()));

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g,c=>{
    const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    return m[c];
  });
}

function normalizeHex(hex){
  const c=String(hex||'').trim().toLowerCase();
  if(PALETTE_SET.has(c)) return c;
  return null;
}

let state={
  hometown:null,
  residences:[],
  visited:{},
  theme:{
    hometownColor:null,
    residenceColor:null,
    visitedDefaultColor:null,
    visitedByColor:{}
  }
};

let allPaths={};
let settingsTab=0;

let pendingHt=null;
let pendingRes=[];
let pendingTheme=null;

let visitedLabelDraftByColor={};
let visitedLabelDraftDirty=false;

let pendingPrefDirty=false; // 出身/居住タブ(0,1)の県選択下書きがあるか

function loadState(){
  try{
    const s=localStorage.getItem('jptr5');
    if(s){
      const parsed=JSON.parse(s);
      if(parsed) state=parsed;
    }
  }catch(e){}
  if(!Array.isArray(state.residences)) state.residences=[];
  if(!state.visited || typeof state.visited!=='object') state.visited={};
  if(!state.theme) state.theme={};
  if(!('visitedByColor' in state.theme) || !state.theme.visitedByColor) state.theme.visitedByColor={};
}

function saveState(){
  try{ localStorage.setItem('jptr5', JSON.stringify(state)); }catch(e){}
}

function getStatus(code){
  const isHt=state.hometown===code;
  const isRes=(state.residences||[]).includes(code);
  if(isHt && isRes) return 'both';
  if(isHt) return 'hometown';
  if(isRes) return 'residence';
  if(state.visited && state.visited[code]) return 'visited';
  return 'none';
}

function visitedMeta(hexLower){
  const k=normalizeHex(hexLower);
  if(!k) return {};
  return state.theme.visitedByColor?.[k] || {};
}
function isVisitedColorVisible(hexLower){
  const k=normalizeHex(hexLower);
  if(!k) return false;
  const v=visitedMeta(k).visible;
  return v===false ? false : true;
}
function getVisitedLabelForColor(hexLower){
  const k=normalizeHex(hexLower);
  if(!k) return '未設定';
  const meta=state.theme.visitedByColor?.[k] || {};
  const draft=visitedLabelDraftByColor?.[k];
  const label=(draft!==undefined) ? draft : meta.label;

  if(label && String(label).trim().length>0) return String(label).trim();
  return '未設定';
}

function getColor(code){
  const s=getStatus(code);
  const residenceSettingsMode = settingsTab === 1; // 画面上のタブ状態

  if(s==='hometown'){
    if(residenceSettingsMode) return UNVISITED_COLOR;
    return normalizeHex(state.theme.hometownColor) || UNVISITED_COLOR;
  }

  if(s==='both'){
    if(residenceSettingsMode){
      return normalizeHex(state.theme.residenceColor) || UNVISITED_COLOR;
    }
    return normalizeHex(state.theme.hometownColor) || UNVISITED_COLOR;
  }

  if(s==='residence') return normalizeHex(state.theme.residenceColor) || UNVISITED_COLOR;

  if(s==='visited'){
    const c=normalizeHex(state.visited[code]?.color);
    if(!c) return normalizeHex(state.theme.visitedDefaultColor) || UNVISITED_COLOR;
    if(!isVisitedColorVisible(c)) return UNVISITED_COLOR;
    return c || normalizeHex(state.theme.visitedDefaultColor) || UNVISITED_COLOR;
  }

  return UNVISITED_COLOR;
}

function isThemeReadyForRecording(){
  return !!normalizeHex(state.theme.hometownColor)
}

function updateLegend(){
  const legendRow=document.getElementById('legendRow');
  if(!legendRow) return;

  const htColor=normalizeHex(state.theme.hometownColor) || UNVISITED_COLOR;
  const resColor=normalizeHex(state.theme.residenceColor) || UNVISITED_COLOR;

  const used=new Set();
  Object.values(state.visited||{}).forEach(v=>{
    const c=normalizeHex(v?.color);
    if(c) used.add(c);
  });

  const ordered=RAINBOW_PALETTE_HEX.filter(hex=>{
    if(!used.has(hex)) return false;
    return isVisitedColorVisible(hex);
  });

  const htLine=`<div class="leg"><div class="leg-dot" style="background:${htColor}"></div><span>出身地</span></div>`;
  const resLine=`<div class="leg"><div class="leg-dot" style="background:${resColor}"></div><span>居住地 / 勤務地</span></div>`;

  let visitedLines='';
  ordered.forEach(hex=>{
    visitedLines += `<div class="leg"><div class="leg-dot" style="background:${hex}"></div><span>${escapeHtml(getVisitedLabelForColor(hex))}</span></div>`;
  });

  const unvisitedLine=`<div class="leg"><div class="leg-dot" style="background:${UNVISITED_COLOR}"></div><span>未訪問</span></div>`;
  legendRow.innerHTML=[htLine,resLine,visitedLines,unvisitedLine].join('');
}

function updateUI(){
  const visitedSet=new Set([...Object.keys(state.visited||{}),state.hometown,...(state.residences||[])].filter(Boolean));
  document.getElementById('cnt').textContent=visitedSet.size;
  document.getElementById('progressFill').style.width=Math.round(visitedSet.size/47*100)+'%';

  Object.entries(allPaths).forEach(([code,el])=>{
    el.setAttribute('fill', getColor(code));
  });

  updateLegend();
}

function getPrefSuffix(code){
  if(code==='01')return '道';
  if(code==='13')return '都';
  if(code==='26'||code==='27')return '府';
  return '県';
}

function initMap(japan){
  const svg=d3.select('#mapSvg');
  const path=d3.geoPath();
  const features=topojson.feature(japan,japan.objects.prefectures).features;

  features.forEach(f=>{
    const code=String(f.id).substring(0,2).padStart(2,'0');
    const name=PREF_MAP[code]||code;
    const el=svg.append('path')
      .attr('d',path(f))
      .attr('fill',getColor(code))
      .attr('stroke','#f5f5f0')
      .attr('stroke-width',0.7)
      .style('cursor','pointer')
      .node();
    allPaths[code]=el;
    el.addEventListener('click',()=>openPref(code,name));
  });

  document.getElementById('loading').style.display='none';
  document.getElementById('mapSvg').style.display='block';
  initPinchZoom();
}

function initPinchZoom(){
  const wrap=document.getElementById('mapWrap');
  const svg=document.getElementById('mapSvg');

  let scale=1,tx=0,ty=0;
  let startDist=0,startScale=1,startTx=0,startTy=0;
  let startMid={x:0,y:0};
  let isDragging=false,lastX=0,lastY=0;

  function applyTransform(){
    const W=wrap.clientWidth,H=wrap.clientHeight;
    const minTx=Math.min(0,W-W*scale);
    const minTy=Math.min(0,H-H*scale);
    tx=Math.max(minTx,Math.min(0,tx));
    ty=Math.max(minTy,Math.min(0,ty));
    svg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
  function mid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2}}

  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      startDist=dist(e.touches);startScale=scale;
      startMid=mid(e.touches);startTx=tx;startTy=ty;
    } else if(e.touches.length===1 && scale>1){
      isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const newDist=dist(e.touches);
      const newScale=Math.min(5,Math.max(1,startScale*newDist/startDist));
      const m=mid(e.touches);
      const ratio=newScale/startScale;
      tx=m.x-(startMid.x-startTx)*ratio;
      ty=m.y-(startMid.y-startTy)*ratio;
      scale=newScale;applyTransform();
    } else if(e.touches.length===1 && isDragging){
      e.preventDefault();
      tx+=e.touches[0].clientX-lastX;
      ty+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
      applyTransform();
    }
  },{passive:false});

  wrap.addEventListener('touchend',()=>{
    if(scale<1.05){scale=1;tx=0;ty=0;applyTransform();}
    isDragging=false;
  });
}

function showSheet(html){
  document.getElementById('sheetContent').innerHTML=html;
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>{
    renderChipsIfNeeded();
    renderVisitColorPaletteIfNeeded();
    renderThemeColorPaletteIfNeeded();
    renderSettingsSheetIfNeeded();
  },60);
}

function renderSettingsSheetIfNeeded(){
  // settingsTab に応じて描画は renderSettingsSheet() が担う
}

function closeSheet(){
  commitPendingSelectionsIfDirty();
  commitVisitedLabelDraftIfDirty();
  document.getElementById('overlay').classList.add('hidden');
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('overlay')) closeSheet();
}

document.addEventListener('click',e=>{
  if(!e.target || !(e.target instanceof Element)) return;
  const overlay=document.getElementById('overlay');
  const sheet=document.getElementById('sheet');
  const isOverlayOpen=overlay && !overlay.classList.contains('hidden');
  const insideSheet=sheet ? sheet.contains(e.target) : false;

  const cityWrap=e.target.closest('.city-input-wrap');
  const chipAdd=e.target.closest('.chip-add-btn');
  const paletteVisit=e.target.closest('#visitColorPalette');
  const paletteTheme=e.target.closest('#themeColorPalette');
  const visitedSettingsRow=e.target.closest('.visited-row');

  if(isOverlayOpen && !insideSheet) return;
  if(cityWrap || chipAdd || paletteVisit || paletteTheme || visitedSettingsRow) return;

  const list=document.getElementById('suggestList');
  const wrap=document.getElementById('cityInputWrap');
  if(wrap && wrap.style.display!=='none'){
    const inp=document.getElementById('cityInput');
    if(inp && inp.value.trim()===''){ closeCityInput(); return; }
  }
  if(list) list.style.display='none';
});

function commitPendingSelectionsIfDirty(){
  if(!pendingPrefDirty) return;
  state.hometown=pendingHt;
  state.residences=(pendingRes||[]).filter(x=>x!==state.hometown);
  pendingPrefDirty=false;
  saveState();
  updateUI();
}

function commitVisitedLabelDraftIfDirty(){
  if(!visitedLabelDraftDirty) return;
  state.theme.visitedByColor=state.theme.visitedByColor || {};
  Object.entries(visitedLabelDraftByColor).forEach(([hexLower,label])=>{
    const h=normalizeHex(hexLower);
    if(!h) return;
    state.theme.visitedByColor[h]=state.theme.visitedByColor[h] || {};
    state.theme.visitedByColor[h].label=String(label||'');
  });
  visitedLabelDraftByColor={};
  visitedLabelDraftDirty=false;
  saveState();
  updateUI();
}

function openPref(code,name){
  const status=getStatus(code);
  const suffix=getPrefSuffix(code);
  const region=REGION_MAP[code]||'';

  let pill='';
  if(status==='hometown'||status==='both') pill=`<span class="status-pill pill-hometown">出身地</span>`;
  else if(status==='residence') pill=`<span class="status-pill pill-residence">居住地 / 勤務地</span>`;
  else if(status==='visited') pill=`<span class="status-pill pill-visited">訪問済み</span>`;
  else pill=`<span class="status-pill pill-none">未訪問</span>`;

  let body='';
  if(status==='hometown'||status==='residence'||status==='both'){
    body=`<div class="btn-group"><button class="btn btn-ghost" onclick="closeSheet()">閉じる</button></div>`;
  } else if(status==='visited' && state.visited[code]){
    const v=state.visited[code];
    const dotColor=normalizeHex(v.color) || normalizeHex(state.theme.visitedDefaultColor) || UNVISITED_COLOR;
    const shownColor=isVisitedColorVisible(dotColor) ? dotColor : UNVISITED_COLOR;
    const label=shownColor===UNVISITED_COLOR ? '未訪問' : getVisitedLabelForColor(dotColor);

    let rows='';
    rows+=`<div class="detail-row"><span class="detail-key">マップの色</span><span class="detail-val"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${shownColor};vertical-align:middle"></span>&nbsp;${escapeHtml(label)}</span></div>`;
    if(v.startDate||v.endDate){
      const l=v.startDate===v.endDate||!v.endDate?v.startDate:(v.startDate+' 〜 '+v.endDate);
      rows+=`<div class="detail-row"><span class="detail-key">滞在期間</span><span class="detail-val">${escapeHtml(l)}</span></div>`;
    }
    if(v.cities&&v.cities.length) rows+=`<div class="detail-row"><span class="detail-key">訪問した市</span><span class="detail-val">${escapeHtml(v.cities.join('、'))}</span></div>`;
    if(v.memo) rows+=`<div class="detail-row"><span class="detail-key">メモ</span><span class="detail-val">${escapeHtml(v.memo)}</span></div>`;

    body=`<div class="visit-detail">${rows}</div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="editVisit('${code}','${name}')">編集</button>
        <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
      </div>
      <button class="del-link" onclick="removeVisit('${code}')">訪問記録を削除</button>`;
  } else {
    if(!isThemeReadyForRecording()){
      body=`<div class="visit-detail">
        <div class="detail-row"><span class="detail-key">要設定</span><span class="detail-val">出身地の色を選択してください</span></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
        <button class="btn btn-blue" onclick="openSettings(0)">設定へ</button>
      </div>`;
    } else {
      body=visitForm(code,{});
    }
  }

  showSheet(`
    <div class="pref-header">
      <div>
        <div class="pref-name">${escapeHtml(name)}${escapeHtml(suffix)}</div>
        <div class="pref-region">${escapeHtml(region)}</div>
      </div>
      ${pill}
    </div>${body}`);
}

let currentCities=[];
let currentPrefCode='';
let currentPickVisitedColor=null;

function visitForm(code,v){
  const today=new Date().toISOString().slice(0,10);
  currentCities=[...(v.cities||[])];
  currentPrefCode=code;

  const savedColor=normalizeHex(v.color);
  currentPickVisitedColor=savedColor || null;

  return `
    <div class="form-section">
      <span class="form-label">滞在期間</span>
      <div class="date-range-wrap">
        <input class="form-input" type="date" id="vStart" value="${v.startDate||today}">
        <span class="date-sep">〜</span>
        <input class="form-input" type="date" id="vEnd" value="${v.endDate||today}">
      </div>
    </div>

    <div class="form-section">
      <span class="form-label">訪問した市区町村</span>
      <div class="city-chips-row" id="cityChips"></div>
      <div class="city-input-wrap" id="cityInputWrap" style="display:none">
        <input class="form-input" type="text" id="cityInput" placeholder="市区町村を検索..."
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="onCityInput('${code}')"
          onfocus="onCityFocus('${code}')">
        <div class="suggest-list" id="suggestList" style="display:none"></div>
      </div>
    </div>

    <div class="form-section">
      <span class="form-label">メモ</span>
      <input class="form-input" type="text" id="vMemo" value="${escapeHtml(v.memo||'')}" placeholder="思い出や感想..." maxlength="80">
    </div>

    <div class="form-section">
      <span class="form-label">マップの色</span>
      <div class="color-palette" id="visitColorPalette"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-ghost" onclick="closeSheet()">キャンセル</button>
      <button class="btn btn-green" onclick="saveVisit('${code}')">記録</button>
    </div>`;
}

function getVisibleVisitedColorsForInput(){
  const ht=normalizeHex(state.theme.hometownColor);
  const res=normalizeHex(state.theme.residenceColor);
  return RAINBOW_PALETTE_HEX.filter(hex=>{
    if(hex===ht || hex===res) return false;
    if(!isVisitedColorVisible(hex)) return false;
    return true;
  });
}

function renderVisitColorPalette(){
  const palette=document.getElementById('visitColorPalette');
  if(!palette) return;
  const colors=getVisibleVisitedColorsForInput();

  palette.innerHTML=colors.map(hex=>{
    const selected=(currentPickVisitedColor && hex===currentPickVisitedColor);
    return `
      <button class="color-swatch ${selected?'selected':''}" style="background:${hex}" type="button" data-color="${hex}" onclick="selectVisitColor('${hex}',this)" aria-label="色選択">
        <span class="check"><b style="font-weight:900;">✓</b></span>
      </button>
    `;
  }).join('');
}

function renderVisitColorPaletteIfNeeded(){
  const p=document.getElementById('visitColorPalette');
  if(p) renderVisitColorPalette();
}

function selectVisitColor(hex){
  currentPickVisitedColor=normalizeHex(hex);
  renderVisitColorPalette();
}

function saveVisit(code){
  if(!isThemeReadyForRecording()){
    alert('色を設定してください');
    return;
  }
  if(!currentPickVisitedColor){
    alert('訪問地の色を選択してください');
    return;
  }
  if(!isVisitedColorVisible(currentPickVisitedColor)){
    alert('選択した色は非表示です');
    return;
  }

  const startDate=document.getElementById('vStart')?.value||'';
  const endDate=document.getElementById('vEnd')?.value||startDate;
  const memo=document.getElementById('vMemo')?.value||'';

  state.visited[code]={
    startDate,endDate,
    cities:[...currentCities],
    memo,
    color:currentPickVisitedColor
  };
  saveState();
  updateUI();
  closeSheet();
}

function editVisit(code,name){
  const v=state.visited[code]||{};
  showSheet(`
    <div class="pref-header">
      <div>
        <div class="pref-name">${escapeHtml(name)}${escapeHtml(getPrefSuffix(code))}</div>
        <div class="pref-region">${escapeHtml(REGION_MAP[code]||'')}</div>
      </div>
      <span class="status-pill pill-visited">訪問済み</span>
    </div>${visitForm(code,v)}
  `);
  setTimeout(()=>{
    renderChips();
    renderVisitColorPalette();
  },60);
}

function removeVisit(code){
  delete state.visited[code];
  saveState();
  updateUI();
  closeSheet();
}

function renderChips(){
  const wrap=document.getElementById('cityChips');
  if(!wrap) return;
  const inputWrap=document.getElementById('cityInputWrap');
  const showAdd=!inputWrap || inputWrap.style.display==='none';

  const html=currentCities.map(c=>`
    <button class="chip" onclick="removeCity('${escapeHtml(c)}')">
      <span>${escapeHtml(c)}</span><span class="chip-x">×</span>

  `).join('');

  wrap.innerHTML=showAdd ? html + `<button class="chip-add-btn" onclick="openCityInput()">＋追加</button>` : html;

function renderChipsIfNeeded(){
  if(document.getElementById('cityChips')) renderChips();
}

function openCityInput(){
  const wrap=document.getElementById('cityInputWrap');
  if(!wrap) return;
  wrap.style.display='block';
  renderChips();
  setTimeout(()=>{
    const inp=document.getElementById('cityInput');
    if(inp){inp.value='';inp.focus();}
    showSuggest(currentPrefCode,'');

function closeCityInput(){
  const wrap=document.getElementById('cityInputWrap');
  const list=document.getElementById('suggestList');
  if(wrap) wrap.style.display='none';
  if(list) list.style.display='none';
  renderChips();
}
function showSuggest(code,q){
  const list=document.getElementById('suggestList');
  if(!list) return;

  const cities=CITIES[code]||[];
  const filtered=q ? cities.filter(c=>c.includes(q)&&!currentCities.includes(c)) : cities.filter(c=>!currentCities.includes(c));

  if(filtered.length===0){
    list.innerHTML=q?`<div class="suggest-item" onclick="addCity('${escapeHtml(q)}')">「${escapeHtml(q)}」を追加</div>`:`<div class="suggest-empty">候補なし</div>`;
  }else{
    list.innerHTML=filtered.slice(0,12).map(c=>`<div class="suggest-item" onclick="addCity('${escapeHtml(c)}')">${escapeHtml(c)}</div>`).join('');
  }
  list.style.display='block';
}
function onCityFocus(code){
  currentPrefCode=code;
  const inp=document.getElementById('cityInput');
  showSuggest(code, inp?inp.value.trim():'');
}
function onCityInput(code){
  currentPrefCode=code;
  const inp=document.getElementById('cityInput');
  if(!inp) return;
  showSuggest(code, inp.value.trim());
}
function addCity(c){
  if(!currentCities.includes(c)) currentCities.push(c);
  closeCityInput();
}
function removeCity(c){
  currentCities=currentCities.filter(x=>x!==c);
  renderChips();
}

// ============ Settings ============
function openSettings(tab){
  settingsTab=tab||0;

  pendingHt=state.hometown;
  pendingRes=[...(state.residences||[])];
  pendingTheme=JSON.parse(JSON.stringify(state.theme||{}));
  if(!pendingTheme.visitedByColor) pendingTheme.visitedByColor={};

  pendingPrefDirty=false;

  if(settingsTab===2){
    visitedLabelDraftByColor={};
    visitedLabelDraftDirty=false;
  }

  renderSettingsSheet();
}

function switchSettingsTab(tab){
  // タブ移動タイミングでまとめて保存（0,1,2の全下書きをコミット）
  commitPendingSelectionsIfDirty();
  commitVisitedLabelDraftIfDirty();

  settingsTab=tab;
  if(settingsTab===2){
    visitedLabelDraftByColor={};
    visitedLabelDraftDirty=false;
  }

  renderSettingsSheet();
}

function onThemeColorPick(hex){
  const h=normalizeHex(hex);
  if(!h) return;

  const htColor=normalizeHex(state.theme.hometownColor);
  if(settingsTab===1 && htColor && h===htColor){
    return;
  }

  if(settingsTab===0){
    state.hometownColor=h;
    state.theme.hometownColor=h;
  }else if(settingsTab===1){
    state.theme.residenceColor=h;
  }else{
    state.theme.visitedDefaultColor=h;
  }

  saveState();
  updateUI();
  renderSettingsSheet();
}

function renderThemeColorPalette(){
  const palette=document.getElementById('themeColorPalette');
  if(!palette) return;

  const selectedLower=normalizeHex(
    settingsTab===0 ? state.theme.hometownColor : (settingsTab===1 ? state.theme.residenceColor : state.theme.visitedDefaultColor)
  );

  const htColor=normalizeHex(state.theme.hometownColor);

  palette.innerHTML=RAINBOW_PALETTE_HEX.map(hex=>{
    const selected=(selectedLower && hex===selectedLower);

    const isForbidden=(settingsTab===1 && htColor && hex===htColor);
    if(isForbidden){
      return `
        <button class="color-swatch" style="background:${hex};opacity:.35;cursor:not-allowed" type="button" aria-label="選択不可">
          <span class="check"><b style="font-weight:900;">✓</b></span>
        </button>
      `;
    }

    return `
      <button class="color-swatch ${selected?'selected':''}" style="background:${hex}" type="button" data-color="${hex}" onclick="onThemeColorPick('${hex}',this)" aria-label="色選択">
        <span class="check"><b style="font-weight:900;">✓</b></span>
      </button>
    `;
  }).join('');
}

function renderThemeColorPaletteIfNeeded(){
  const p=document.getElementById('themeColorPalette');
  if(p) renderThemeColorPalette();
}

function renderSettingsSheet(){
  if(settingsTab===0 || settingsTab===1){
    const isHt=settingsTab===0;

    const htColor=normalizeHex(state.theme.hometownColor) || UNVISITED_COLOR;
    const resColor=normalizeHex(state.theme.residenceColor) || UNVISITED_COLOR;

    let grid='';
    PREFS_LIST.forEach(p=>{
      const onclick=`onclick="settingsTogglePref('${p.id}',this)"`;

      if(isHt){
        if(pendingHt===p.id){
          grid+=`<div class="pref-opt" ${onclick} style="background:${htColor};border-color:${htColor};color:#fff;">${p.name}</div>`;
          return;
        }
      }else{
        if(pendingHt===p.id){
          grid+=`<div class="pref-opt disabled-ht">${p.name}</div>`;
          return;
        }

        if(pendingRes.includes(p.id)){
          grid+=`<div class="pref-opt" ${onclick} style="background:${resColor};border-color:${resColor};color:#fff;">${p.name}</div>`;
          return;
        }
      }

      grid+=`<div class="pref-opt" ${onclick}>${p.name}</div>`;
    });

    const title='設定';
    const sub=isHt?'色を設定してください':'色を設定してください';

    showSheet(`
      <div class="settings-title">${title}</div>
      <div class="settings-tabs">
        <button class="stab ${settingsTab===0?'active':''}" onclick="switchSettingsTab(0)">出身地</button>
        <button class="stab ${settingsTab===1?'active':''}" onclick="switchSettingsTab(1)">居住地 / 勤務地</button>
        <button class="stab ${settingsTab===2?'active':''}" onclick="switchSettingsTab(2)">色設定</button>
      </div>

      <div class="settings-sub">${sub}</div>

      <div class="color-section" style="margin-bottom:16px">
        <div class="color-palette" id="themeColorPalette"></div>
      </div>

      <div class="settings-sub" style="margin-bottom:10px">${isHt?'複数選択不可':'複数選択可'}</div>
      <div class="pref-grid">${grid}</div>

      <div class="btn-group" style="margin-bottom:16px">
        <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
      </div>
    `);

    setTimeout(()=>{
      renderThemeColorPalette();
    },40);
    return;
  }

  showSheet(`
    <div class="settings-title">設定</div>
    <div class="settings-tabs">
      <button class="stab" onclick="switchSettingsTab(0)">出身地</button>
      <button class="stab" onclick="switchSettingsTab(1)">居住地 / 勤務地</button>
      <button class="stab active" onclick="switchSettingsTab(2)">色設定</button>
    </div>

    <div class="settings-sub" style="margin-bottom:12px">色ごとのラベルと表示/非表示を設定します</div>

    <div class="visited-color-rows">
      ${renderVisitedSettingsRows()}
    </div>

    <div class="btn-group" style="margin-top:16px;margin-bottom:16px">
      <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
    </div>
  `);
}

function settingsTogglePref(id,el){
  // 県クリックは「即反映」しない。下書きだけ更新して、画面は再描画する
  if(settingsTab===0){
    pendingHt=(pendingHt===id)?null:id;
    // 出身地を変更したら、居住地の下書きから出身地を消す（色の重複回避）
    pendingRes=(pendingRes||[]).filter(x=>x!==pendingHt);
  }else if(settingsTab===1){
    if(pendingHt===id) return;
    if(pendingRes.includes(id)){
      pendingRes=pendingRes.filter(x=>x!==id);
      el.classList.remove('sel-res');
    }else{
      pendingRes.push(id);
      el.classList.add('sel-res');
    }
    pendingRes=(pendingRes||[]).filter(x=>x!==pendingHt);
  }

  pendingPrefDirty=true;

  // 地図や保存はしない。UI（選択中の色だけ）を今すぐ反映
  renderSettingsSheet();
}

function renderVisitedSettingsRows(){
  const ht=normalizeHex(state.theme.hometownColor);
  const res=normalizeHex(state.theme.residenceColor);

  return RAINBOW_PALETTE_HEX
    .filter(hex=>hex!==ht && hex!==res)
    .map(hex=>{
      const meta=state.theme.visitedByColor?.[hex] || {};
      const draftLabel=visitedLabelDraftByColor?.[hex];
      const labelToShow=(draftLabel!==undefined)
        ? draftLabel
        : (meta.label && String(meta.label).trim().length>0 ? String(meta.label).trim() : '');

      const visible=(meta.visible===false)?false:true;
      const isDefault=(state.theme.visitedDefaultColor && hex===normalizeHex(state.theme.visitedDefaultColor));

      return `
        <div class="visited-row ${isDefault?'selected':''}">
          <div class="visited-row-swatch" style="background:${hex}"></div>

          <div class="visited-row-main">
            <input class="form-input" type="text"
              value="${escapeHtml(labelToShow)}"
              placeholder=""
              maxlength="12"
              oninput="onVisitedLabel('${hex}',this.value)">
          </div>

          <button class="visited-toggle ${visible?'on':''}" type="button" onclick="onVisitedVisible('${hex}')">
            ${visible?'表示':'非表示'}
          </button>
        </div>
      `;
    }).join('');
}

function onVisitedLabel(hex,value){
  const k=normalizeHex(hex);
  if(!k) return;

  visitedLabelDraftByColor=visitedLabelDraftByColor || {};
  visitedLabelDraftByColor[k]=String(value||'');

  visitedLabelDraftDirty=true;

  updateLegend();
}

function onVisitedVisible(hex){
  const k=normalizeHex(hex);
  if(!k) return;

  state.theme.visitedByColor=state.theme.visitedByColor||{};
  state.theme.visitedByColor[k]=state.theme.visitedByColor[k]||{};
  const cur=state.theme.visitedByColor[k].visible;
  state.theme.visitedByColor[k].visible=(cur===false)?true:false;

  if(!isVisitedColorVisible(state.theme.visitedDefaultColor)){
    const ht=normalizeHex(state.theme.hometownColor);
    const res=normalizeHex(state.theme.residenceColor);
    const first=RAINBOW_PALETTE_HEX.find(c=>c!==ht && c!==res && isVisitedColorVisible(c));
    state.theme.visitedDefaultColor=first || null;
  }

  commitVisitedLabelDraftIfDirty();
  saveState();
  updateUI();
  renderSettingsSheet();
}

loadState();

const CDN1='https://unpkg.com/jpn-atlas@1/japan/japan.json';
const CDN2='https://cdn.jsdelivr.net/npm/jpn-atlas@1/japan/japan.json';
const CDN3='https://cdn.jsdelivr.net/npm/jpn-atlas/japan/japan.json';

d3.json(CDN1).catch(()=>d3.json(CDN2)).catch(()=>d3.json(CDN3)).then(japan=>{
  initMap(japan);
  updateUI();

  if(!isThemeReadyForRecording()){
    setTimeout(()=>openSettings(0),400);
  }
}).catch(err=>{
  console.error('Map load error:',err);
  const loading=document.getElementById('loading');
  if(loading){
    loading.innerHTML='地図の読み込みに失敗しました。<br>インターネット接続を確認して再読み込みしてください。<br><br><button onclick="location.reload()" style="padding:10px 22px;border-radius:12px;border:none;background:#2d7a4f;color:#fff;font-size:15px;font-weight:700;cursor:pointer">再読み込み</button>';
  }
});
</script>

<meta name="apple-mobile-web-app-title" content="TABIATO">
<meta name="theme-color" content="#f5f5f0">
<title>TABIATO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','YuGothic',sans-serif;background:#f5f5f0;display:flex;flex-direction:column;height:100%;height:100dvh}

.header{background:#f5f5f0;padding:14px 18px 8px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.counter-group{display:flex;align-items:baseline;gap:5px}
.counter-num{font-size:30px;font-weight:800;color:#1a1a1a;letter-spacing:-1.5px;line-height:1}
.counter-denom{font-size:14px;font-weight:500;color:#bbb}
.counter-label{font-size:11px;color:#ccc;margin-left:3px;letter-spacing:.3px}
.gear-btn{width:38px;height:38px;border-radius:50%;background:#eaeae5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:background .15s;flex-shrink:0}
.gear-btn:active{background:#d8d8d2}

.progress-wrap{padding:0 18px 10px;flex-shrink:0}
.progress-track{height:3px;background:#e4e4dc;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#2d7a4f;border-radius:2px;transition:width .4s ease}

.map-wrap{flex:1;overflow:hidden;position:relative;touch-action:none}
#mapSvg{width:100%;height:100%;display:none;transform-origin:0 0}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#bbb;letter-spacing:.3px}

.legend-row{padding:8px 18px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:14px;align-items:center;flex-shrink:0;background:#f5f5f0}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;letter-spacing:.2px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* オーバーレイ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.overlay.hidden{display:none}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:0 0 max(28px,env(safe-area-inset-bottom));animation:slideUp .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#e5e5e5;border-radius:2px;margin:12px auto 18px}
.sheet-inner{padding:0 20px}

/* 都道府県ヘッダー */
.pref-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.pref-name{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-.5px}
.pref-region{font-size:12px;color:#ccc;margin-top:3px;letter-spacing:.3px}
.status-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;flex-shrink:0;margin-top:4px}
.pill-visited{background:#e8f5ee;color:#2d7a4f}
.pill-hometown{background:#e8f0fb;color:#2255b0}
.pill-residence{background:#eef3fc;color:#5580cc}
.pill-none{background:#f0f0ec;color:#bbb}

/* フォーム */
.form-section{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-input{width:100%;padding:11px 13px;border-radius:13px;border:1.5px solid #eeeee9;background:#f8f8f5;font-size:16px;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s,background .15s}
.form-input:focus{border-color:#2d7a4f;background:#fff}
.date-range-wrap{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.date-sep{font-size:13px;color:#ccc;text-align:center;flex-shrink:0}

/* 市区町村チップ */
.city-chips-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:#e8f5ee;color:#2d7a4f;font-size:12px;font-weight:600;cursor:pointer;border:none;-webkit-appearance:none}
.chip .chip-x{font-size:14px;color:#2d7a4f;line-height:1;margin-left:1px}
.chip-add-btn{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;background:none;border:1.5px dashed #ccc;color:#aaa;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:all .15s}
.chip-add-btn:active{background:#f5f5f5}
.city-input-wrap{position:relative;margin-top:8px}
.city-input-wrap.hidden{display:none}
.suggest-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #eeeee9;border-radius:13px;max-height:160px;overflow-y:auto;z-index:10;-webkit-overflow-scrolling:touch;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.suggest-list.hidden{display:none}
.suggest-item{padding:11px 14px;font-size:14px;color:#1a1a1a;cursor:pointer;border-bottom:1px solid #f4f4f0}
.suggest-item:last-child{border-bottom:none}
.suggest-item:active{background:#f8f8f5}
.suggest-empty{padding:11px 14px;font-size:13px;color:#bbb}

/* 訪問詳細 */
.visit-detail{background:#f8f8f5;border-radius:14px;padding:14px;margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0}
.detail-row+.detail-row{border-top:1px solid #eeeee9}
.detail-key{font-size:12px;color:#bbb;flex-shrink:0;padding-right:12px}
.detail-val{font-size:14px;color:#1a1a1a;font-weight:500;text-align:right;word-break:break-all}

/* ボタン */
.btn-group{display:flex;gap:9px}
.btn{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:800;font-family:inherit;border:none;cursor:pointer;-webkit-appearance:none;transition:opacity .12s}
.btn:active{opacity:.7}
.btn-ghost{background:#f0f0ec;color:#555}
.btn-green{background:#2d7a4f;color:#fff}
.btn-blue{background:#2255b0;color:#fff}
.del-link{background:none;border:none;font-size:13px;color:#e05252;cursor:pointer;padding:11px 0 0;display:block;text-align:center;-webkit-appearance:none}

/* 設定シート */
.settings-tabs{display:flex;gap:0;margin-bottom:18px;background:#f0f0ec;border-radius:12px;padding:3px}
.stab{flex:1;padding:8px;border-radius:10px;text-align:center;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border:none;background:none;-webkit-appearance:none;transition:all .15s}
.stab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.settings-title{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-.5px;margin-bottom:4px}
.settings-sub{font-size:13px;color:#bbb;margin-bottom:16px;line-height:1.5}
.pref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;max-height:200px;overflow-y:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pref-opt{padding:9px 4px;border-radius:10px;border:1.5px solid #eeeee9;background:#f8f8f5;font-size:11px;text-align:center;cursor:pointer;color:#555;font-weight:600;transition:all .12s;-webkit-appearance:none}
.pref-opt:active{opacity:.7}
.pref-opt.sel-ht{background:#2255b0;color:#fff;border-color:#2255b0}
.pref-opt.sel-res{background:#7aa3e0;color:#fff;border-color:#7aa3e0}
.pref-opt.sel-both{background:linear-gradient(135deg,#2255b0 50%,#7aa3e0 50%);color:#fff;border-color:#2255b0}
.pref-opt.disabled-ht{background:#f0f0ec;color:#ccc;border-color:#eee;cursor:not-allowed;opacity:.6}
</style>
</head>

const PREFS_LIST=Object.entries(PREF_MAP).map(([id,name])=>({id,name}));
let state={hometown:null,residences:[],visited:{}};
let allPaths={};
let pendingHt=null;
let pendingRes=[];
let currentCities=[];
let settingsTab=0;

function loadState(){try{const s=localStorage.getItem('jptr5');if(s)state=JSON.parse(s);if(!state.residences)state.residences=[];}catch(e){}}
function saveState(){try{localStorage.setItem('jptr5',JSON.stringify(state));}catch(e){}}

function getStatus(code){
  const isHt=state.hometown===code;
  const isRes=state.residences.includes(code);
  if(isHt&&isRes)return 'both';
  if(isHt)return 'hometown';
  if(isRes)return 'residence';
  if(state.visited[code])return 'visited';
  return 'none';
}
function getColor(code){
  const s=getStatus(code);
  if(s==='hometown'||s==='both')return '#2255b0';
  if(s==='residence')return '#7aa3e0';
  if(s==='visited')return '#2d7a4f';
  return '#d0d0c8';
}
function updateUI(){
  const visited=new Set([...Object.keys(state.visited),state.hometown,...state.residences].filter(Boolean));
  const n=visited.size;
  document.getElementById('cnt').textContent=n;
  document.getElementById('progressFill').style.width=Math.round(n/47*100)+'%';
  Object.entries(allPaths).forEach(([code,el])=>el.setAttribute('fill',getColor(code)));
}
function getPrefSuffix(code){
  if(code==='01')return '道';if(code==='13')return '都';
  if(code==='26'||code==='27')return '府';return '県';
}

function initMap(japan){
  const svg=d3.select('#mapSvg');
  const path=d3.geoPath();
  const features=topojson.feature(japan,japan.objects.prefectures).features;
  features.forEach(f=>{
    const code=String(f.id).substring(0,2).padStart(2,'0');
    const name=PREF_MAP[code]||code;
    const el=svg.append('path')
      .attr('d',path(f)).attr('fill',getColor(code))
      .attr('stroke','#f5f5f0').attr('stroke-width',0.7)
      .style('cursor','pointer').node();
    allPaths[code]=el;
    el.addEventListener('click',()=>openPref(code,name));
    const c=path.centroid(f);
    if(c&&!isNaN(c[0])&&name.length<=3){
      svg.append('text').attr('x',c[0]).attr('y',c[1])
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size','4.5').attr('fill','rgba(255,255,255,.88)')
        .attr('pointer-events','none')
        .attr('font-family','-apple-system,BlinkMacSystemFont,sans-serif')
        .attr('font-weight','600').text(name);
    }
  });
  document.getElementById('loading').style.display='none';
  document.getElementById('mapSvg').style.display='block';
  initPinchZoom();
}

/* ---- ピンチズーム ---- */
function initPinchZoom(){
  const wrap=document.getElementById('mapWrap');
  const svg=document.getElementById('mapSvg');
  let scale=1,tx=0,ty=0;
  let startDist=0,startScale=1,startTx=0,startTy=0;
  let startMid={x:0,y:0};
  let isDragging=false,lastX=0,lastY=0;

  function applyTransform(){
    const W=wrap.clientWidth,H=wrap.clientHeight;
    const minTx=Math.min(0,W-W*scale);
    const minTy=Math.min(0,H-H*scale);
    tx=Math.max(minTx,Math.min(0,tx));
    ty=Math.max(minTy,Math.min(0,ty));
    svg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
  function mid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2}}

  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      startDist=dist(e.touches);startScale=scale;
      startMid=mid(e.touches);startTx=tx;startTy=ty;
    } else if(e.touches.length===1&&scale>1){
      isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const newDist=dist(e.touches);
      const newScale=Math.min(5,Math.max(1,startScale*newDist/startDist));
      const m=mid(e.touches);
      const ratio=newScale/startScale;
      tx=m.x-(startMid.x-startTx)*ratio;
      ty=m.y-(startMid.y-startTy)*ratio;
      scale=newScale;applyTransform();
    } else if(e.touches.length===1&&isDragging){
      e.preventDefault();
      tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
      applyTransform();
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(e.touches.length<2){isDragging=false;}
    if(scale<1.05){scale=1;tx=0;ty=0;applyTransform();}
  });
}

/* ---- 都道府県タップ ---- */
function openPref(code,name){
  const status=getStatus(code);
  const v=state.visited[code];
  const suffix=getPrefSuffix(code);
  const region=REGION_MAP[code]||'';

  let pill='';
  if(status==='hometown'||status==='both') pill=`<span class="status-pill pill-hometown">出身地</span>`;
  else if(status==='residence') pill=`<span class="status-pill pill-residence">居住地</span>`;
  else if(status==='visited') pill=`<span class="status-pill pill-visited">訪問済み</span>`;
  else pill=`<span class="status-pill pill-none">未訪問</span>`;

  let body='';
  if(status==='hometown'||status==='residence'||status==='both'){
    body=`<div class="btn-group"><button class="btn btn-ghost" onclick="closeSheet()">閉じる</button></div>`;
  } else if(status==='visited'&&v){
    let rows='';
    if(v.startDate||v.endDate){
      const label=v.startDate===v.endDate||!v.endDate?v.startDate:(v.startDate+' 〜 '+v.endDate);
      rows+=`<div class="detail-row"><span class="detail-key">滞在期間</span><span class="detail-val">${label}</span></div>`;
    }
    if(v.cities&&v.cities.length) rows+=`<div class="detail-row"><span class="detail-key">訪問した市</span><span class="detail-val">${v.cities.join('、')}</span></div>`;
    if(v.memo) rows+=`<div class="detail-row"><span class="detail-key">メモ</span><span class="detail-val">${v.memo}</span></div>`;
    body=`<div class="visit-detail">${rows}</div>
    <div class="btn-group">
      <button class="btn btn-ghost" onclick="editVisit('${code}','${name}')">編集</button>
      <button class="btn btn-ghost" onclick="closeSheet()">閉じる</button>
    </div>
    <button class="del-link" onclick="removeVisit('${code}')">訪問記録を削除</button>`;
  } else {
    body=visitForm(code,{});
  }

  showSheet(`
    <div class="pref-header">
      <div><div class="pref-name">${name}${suffix}</div><div class="pref-region">${region}</div></div>
      ${pill}
    </div>${body}`);
}

function visitForm(code,v){
  const today=new Date().toISOString().slice(0,10);
  currentCities=[...(v.cities||[])];
  return `
    <div class="form-section">
      <span class="form-label">滞在期間</span>
      <div class="date-range-wrap">
        <input class="form-input" type="date" id="vStart" value="${v.startDate||today}">
        <span class="date-sep">〜</span>
        <input class="form-input" type="date" id="vEnd" value="${v.endDate||today}">
      </div>
    </div>
    <div class="form-section">
      <span class="form-label">訪問した市区町村</span>
      <div class="city-chips-row" id="cityChips"></div>
      <div class="city-input-wrap" id="cityInputWrap" style="display:none">
        <input class="form-input" type="text" id="cityInput" placeholder="市区町村を検索..."
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="onCityInput('${code}')" onfocus="onCityFocus('${code}')">
        <div class="suggest-list" id="suggestList" style="display:none"></div>
      </div>
    </div>
    <div class="form-section">
      <span class="form-label">メモ</span>
      <input class="form-input" type="text" id="vMemo" value="${v.memo||''}" placeholder="思い出や感想..." maxlength="80">
    </div>
    <div class="btn-group">
      <button class="btn btn-ghost" onclick="closeSheet()">キャンセル</button>
      <button class="btn btn-green" onclick="saveVisit('${code}')">記録する</button>
    </div>`;
}

let currentPrefCode='';

function renderChips(){
  const wrap=document.getElementById('cityChips');
  if(!wrap)return;
  // 選択済みチップ
  let html=currentCities.map(c=>
    `<button class="chip" onclick="removeCity('${c}')"><span>${c}</span><span class="chip-x">×</span></button>`
  ).join('');
  // +追加ボタン（入力欄が閉じているときだけ表示）
  const inputWrap=document.getElementById('cityInputWrap');
  if(!inputWrap||inputWrap.style.display==='none'){
    html+=`<button class="chip-add-btn" onclick="openCityInput()">＋追加</button>`;
  }
  wrap.innerHTML=html;
}

function openCityInput(){
  const wrap=document.getElementById('cityInputWrap');
  if(!wrap)return;
  wrap.style.display='block';
  renderChips(); // +追加ボタンを消す
  // 少し遅延してfocusするとiOSでキーボードが確実に開く
  setTimeout(()=>{
    const inp=document.getElementById('cityInput');
    if(inp){inp.value='';inp.focus();}
    showSuggest(currentPrefCode,'');
  },80);
}

function closeCityInput(){
  const wrap=document.getElementById('cityInputWrap');
  const list=document.getElementById('suggestList');
  if(wrap)wrap.style.display='none';
  if(list)list.style.display='none';
  renderChips(); // +追加ボタンを再表示
}

function showSuggest(code,q){
  const list=document.getElementById('suggestList');
  if(!list)return;
  const cities=CITIES[code]||[];
  const filtered=q
    ?cities.filter(c=>c.includes(q)&&!currentCities.includes(c))
    :cities.filter(c=>!currentCities.includes(c));
  if(filtered.length===0){
    list.innerHTML=q?`<div class="suggest-item" onclick="addCity('${q}')">「${q}」を追加</div>`:`<div class="suggest-empty">候補なし</div>`;
  } else {
    list.innerHTML=filtered.slice(0,12).map(c=>
      `<div class="suggest-item" onclick="addCity('${c}')">${c}</div>`
    ).join('');
  }
  list.style.display='block';
}

function onCityFocus(code){
  currentPrefCode=code;
  const inp=document.getElementById('cityInput');
  showSuggest(code, inp?inp.value.trim():'');
}

function onCityInput(code){
  currentPrefCode=code;
  const inp=document.getElementById('cityInput');
  if(!inp)return;
  showSuggest(code, inp.value.trim());
}

function addCity(c){
  if(!currentCities.includes(c))currentCities.push(c);
  closeCityInput();
}
function addCityCustom(c){addCity(c);}
function removeCity(c){currentCities=currentCities.filter(x=>x!==c);renderChips();}

document.addEventListener('click',e=>{
  if(!e.target.closest('.city-input-wrap')&&!e.target.closest('.chip-add-btn')){
    const list=document.getElementById('suggestList');
    const wrap=document.getElementById('cityInputWrap');
    // 入力欄が空なら畳む
    const inp=document.getElementById('cityInput');
    if(wrap&&wrap.style.display!=='none'&&inp&&inp.value.trim()===''){
      closeCityInput();
    } else if(list){
      list.style.display='none';
    }
  }
});

function editVisit(code,name){
  const v=state.visited[code]||{};
  const suffix=getPrefSuffix(code);
  const region=REGION_MAP[code]||'';
  showSheet(`
    <div class="pref-header">
      <div><div class="pref-name">${name}${suffix}</div><div class="pref-region">${region}</div></div>
      <span class="status-pill pill-visited">訪問済み</span>
    </div>
    ${visitForm(code,v)}
  `);
  setTimeout(()=>{currentPrefCode=code;renderChips();},50);
}

function saveVisit(code){
  const startDate=document.getElementById('vStart')?.value||'';
  const endDate=document.getElementById('vEnd')?.value||startDate;
  const memo=document.getElementById('vMemo')?.value||'';
  state.visited[code]={startDate,endDate,cities:[...currentCities],memo};
  saveState();updateUI();closeSheet();
}
function removeVisit(code){delete state.visited[code];saveState();updateUI();closeSheet();}

/* ---- 設定 ---- */
function openSettings(tab){
  settingsTab=tab||0;
  pendingHt=state.hometown;
  pendingRes=[...state.residences];
  renderSettingsSheet();
}

function renderSettingsSheet(){
  const isHt=settingsTab===0;
  let grid='';
  PREFS_LIST.forEach(p=>{
    let cls='';
    let onclick=`onclick="settingsToggle('${p.id}',this)"`;
    if(isHt){
      cls=pendingHt===p.id?'sel-ht':'';
    } else {
      // 居住地タブ：出身地と同じ県はグレーアウトして選択不可
      if(pendingHt===p.id){
        cls='disabled-ht';
        onclick=''; // クリック無効
      } else {
        cls=pendingRes.includes(p.id)?'sel-res':'';
      }
    }
    grid+=`<div class="pref-opt ${cls}" ${onclick}>${p.name}</div>`;
  });

  const subText=isHt
    ?'青で表示。1か所だけ選択できます'
    :'水色で表示。複数選択できます。出身地は選択できません';

  showSheet(`
    <div class="settings-title">設定</div>
    <div class="settings-sub" style="margin-bottom:12px">地図に反映されます</div>
    <div class="settings-tabs">
      <button class="stab ${settingsTab===0?'active':''}" onclick="switchSettingsTab(0)">出身地</button>
      <button class="stab ${settingsTab===1?'active':''}" onclick="switchSettingsTab(1)">居住地 / 勤務地</button>
    </div>
    <div class="settings-sub">${subText}</div>
    <div class="pref-grid">${grid}</div>
    <div class="btn-group">
      <button class="btn btn-ghost" onclick="closeSheet()">キャンセル</button>
      <button class="btn btn-blue" onclick="saveSettings()">設定する</button>
    </div>
  `);
}

function switchSettingsTab(tab){settingsTab=tab;renderSettingsSheet();}

function settingsToggle(id,el){
  if(settingsTab===0){
    pendingHt=pendingHt===id?null:id;
    document.querySelectorAll('.pref-opt').forEach(e=>e.classList.remove('sel-ht'));
    if(pendingHt)el.classList.add('sel-ht');
    // 出身地を変えたら居住地から自動除外（整合性）
    pendingRes=pendingRes.filter(x=>x!==pendingHt);
  } else {
    // 出身地と同じならタップ無視
    if(pendingHt===id)return;
    if(pendingRes.includes(id)){
      pendingRes=pendingRes.filter(x=>x!==id);el.classList.remove('sel-res');
    } else {
      pendingRes.push(id);el.classList.add('sel-res');
    }
  }
}

function saveSettings(){
  state.hometown=pendingHt;state.residences=[...pendingRes];
  saveState();updateUI();closeSheet();
}

function showSheet(html){
  document.getElementById('sheetContent').innerHTML=html;
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>{const c=document.getElementById('cityChips');if(c){renderChips();}},60);
}
function closeSheet(){document.getElementById('overlay').classList.add('hidden');}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeSheet();}

loadState();

    setTimeout(()=>{openSettings(0);},400);
  }
}).catch(()=>{document.getElementById('loading').textContent='地図の読み込みに失敗しました。通信環境を確認してください。';});
